---
# ChromaDB Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chromadb
  template:
    metadata:
      labels:
        app: chromadb
    spec:
      containers:
      - name: chromadb
        image: chromadb/chroma:latest
        ports:
        - containerPort: 8000
        env:
        - name: IS_PERSISTENT
          value: "TRUE"
        - name: ANONYMIZED_TELEMETRY
          value: "FALSE"
        - name: CHROMA_CORS_ALLOW_ORIGINS
          value: '["*"]'
        volumeMounts:
        - name: chromadb-data
          mountPath: /chroma/chroma
      volumes:
      - name: chromadb-data
        persistentVolumeClaim:
          claimName: chromadb-pvc
---
# ChromaDB Service
apiVersion: v1
kind: Service
metadata:
  name: chromadb
spec:
  selector:
    app: chromadb
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
---
# ChromaDB PersistentVolumeClaim
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chromadb-pvc
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# Rule Agent Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rule-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rule-agent
  template:
    metadata:
      labels:
        app: rule-agent
    spec:
      containers:
      - name: rule-agent
        image: us-docker.pkg.dev/PROJECT_ID/dnd-master-repository/dnd-master-rule-agent:TAG
        ports:
        - containerPort: 9002
        env:
        - name: GCP_PROJECT
          value: "PROJECT_ID"
        - name: GCP_LOCATION
          value: "us-central1"
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/secrets/gcp-service.json"
        - name: CHROMADB_HOST
          value: "chromadb"
        - name: CHROMADB_PORT
          value: "8000"
        volumeMounts:
        - name: gcp-secrets
          mountPath: /secrets
          readOnly: true
        command: ["/bin/bash", "-c", "uv run uvicorn app:app --host 0.0.0.0 --port 9002"]
      volumes:
      - name: gcp-secrets
        secret:
          secretName: gcp-service-account
---
# Rule Agent Service
apiVersion: v1
kind: Service
metadata:
  name: rule-agent
spec:
  selector:
    app: rule-agent
  ports:
  - port: 9002
    targetPort: 9002
  type: ClusterIP
---
# Combat Agent Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: combat-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: combat-agent
  template:
    metadata:
      labels:
        app: combat-agent
    spec:
      containers:
      - name: combat-agent
        image: us-docker.pkg.dev/PROJECT_ID/dnd-master-repository/dnd-master-api-service:TAG
        ports:
        - containerPort: 9000
        env:
        - name: GCP_PROJECT
          value: "PROJECT_ID"
        - name: GCP_LOCATION
          value: "us-central1"
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/secrets/gcp-service.json"
        - name: DEV
          value: "0"
        volumeMounts:
        - name: gcp-secrets
          mountPath: /secrets
          readOnly: true
      volumes:
      - name: gcp-secrets
        secret:
          secretName: gcp-service-account
---
# Combat Agent Service
apiVersion: v1
kind: Service
metadata:
  name: combat-agent
spec:
  selector:
    app: combat-agent
  ports:
  - port: 9000
    targetPort: 9000
  type: ClusterIP
---
# API Gateway (Orchestrator) Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: us-docker.pkg.dev/PROJECT_ID/dnd-master-repository/dnd-master-orchestrator:TAG
        ports:
        - containerPort: 8000
        env:
        - name: GCP_PROJECT
          value: "PROJECT_ID"
        - name: GCP_LOCATION
          value: "us-central1"
        - name: NARRATOR_ENDPOINT_ID
          value: "5165249441082376192"
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/secrets/gcp-service.json"
        - name: RULE_AGENT_URL
          value: "http://rule-agent:9002"
        - name: COMBAT_AGENT_URL
          value: "http://combat-agent:9000"
        volumeMounts:
        - name: gcp-secrets
          mountPath: /secrets
          readOnly: true
      volumes:
      - name: gcp-secrets
        secret:
          secretName: gcp-service-account
---
# API Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: us-docker.pkg.dev/PROJECT_ID/dnd-master-repository/dnd-master-frontend-react:TAG
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_PUBLIC_API_BASE_URL
          value: "/api"
---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
---
# Nginx Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
# Nginx Service (LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer
---
# Nginx ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    upstream frontend {
        server frontend:3000;
    }

    upstream api {
        server api-gateway:8000;
    }

    server {
        listen 80;
        server_name _;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API Gateway
        location /api/ {
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Health check endpoint
        location /health {
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
