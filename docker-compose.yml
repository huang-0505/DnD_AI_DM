services:
  web:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    image: dnd/frontend:milestone2
    container_name: dnd-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: "/api"
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      - api-gateway
    networks:
      - dnd-master-network

  # Rule Agent (RAG-based D&D rules validation)
  rule-agent:
    build:
      context: ./src/rule_agent
      dockerfile: Dockerfile
    image: dnd/rule-agent:milestone4
    container_name: dnd-rule-agent
    environment:
      GCP_PROJECT: ${GCP_PROJECT}
      GCP_LOCATION: us-central1
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/llm-service-account.json
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
    volumes:
      - ./secrets:/secrets:ro
    expose:
      - "9002"
    restart: unless-stopped
    depends_on:
      - chromadb
    command: ["/bin/bash", "-c", "uv run uvicorn app:app --host 0.0.0.0 --port 9002"]
    networks:
      - dnd-master-network

  # Combat Agent (backend)
  combat-agent:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    image: dnd/combat-agent:milestone4
    container_name: dnd-combat-agent
    environment:
      GCP_PROJECT: ${GCP_PROJECT}
      GCP_LOCATION: us-central1
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/llm-service-account.json
      DEV: "0"
    volumes:
      - ./secrets:/secrets:ro
    expose:
      - "9000"
    restart: unless-stopped
    networks:
      - dnd-master-network


  # Orchestrator (main game controller with rule validation)
  api-gateway:
    build:
      context: ./src/orchestrator
      dockerfile: Dockerfile
    image: dnd/api-gateway:milestone4
    container_name: dnd-api-gateway
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GCP_PROJECT: ${GCP_PROJECT}
      GCP_LOCATION: us-central1
      NARRATOR_ENDPOINT_ID: "5165249441082376192"
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/llm-service-account.json
      RULE_AGENT_URL: http://rule-agent:9002
      COMBAT_AGENT_URL: http://combat-agent:9000
      NARRATOR_AGENT_URL: http://narrator-agent:9001
    volumes:
      - ./secrets:/secrets:ro
    expose:
      - "8000"
    restart: unless-stopped
    depends_on:
      - chromadb
      - rule-agent
      - combat-agent
    networks:
      - dnd-master-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: dnd-chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./src/rag/docker-volumes/chromadb:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - CHROMA_CORS_ALLOW_ORIGINS=["*"]
    networks:
      - dnd-master-network

  nginx:
    image: nginx:1.27-alpine
    container_name: dnd-nginx
    depends_on:
      - web
      - api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./src/infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dnd-master-network

networks:
  dnd-master-network:
    name: dnd-master-network