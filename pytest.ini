[pytest]
# Pytest configuration file for DnD Master test suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers for test categorization
markers =
    unit: Fast unit tests (isolated, no external dependencies)
    integration: API integration tests (using TestClient)
    system: System tests (requires running Docker services)
    slow: Slow running tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    --durations=10

# Coverage options (when using pytest-cov)
# --cov=src/backend/api
# --cov=src/rule_agent
# --cov=src/orchestrator
# --cov-report=term-missing
# --cov-report=html
# --cov-report=xml

# Asyncio configuration
asyncio_mode = auto

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

